<!DOCTYPE html>
<html>
<head>
  <title>Will you be my Valentine?</title>
  <style>
    body {
      background: pink;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: white;
      width: 80%;
      max-width: 600px;
      margin: auto;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 35px;
    }

    button {
      padding: 15px 35px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      margin: 20px;
      cursor: pointer;
    }

    #yesBtn {
      background: #ff2f7d;
      color: white;
    }

    #noBtn {
      background: #ddd;
      position: relative;
    }

    #celebrate {
      display: none;
    }

    img {
      width: 260px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="box" id="question">
    <h1>Will you be my Valentine? ❤️</h1>
    <button id="yesBtn" onclick="sayYes()">Yes</button>
    <button id="noBtn" onmouseover="moveNo()">No</button>
    <p>"No" seems a bit shy 😈</p>
  </div>

  <div class="box" id="celebrate">
    <h1>YAY! 🎉❤️</h1>
    <p>I knew you would say yes 😌</p>
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
  </div>

  <script>
    function sayYes() {
      document.getElementById("question").style.display = "none";
      document.getElementById("celebrate").style.display = "block";
      confetti();
    }

    function moveNo() {
      const noBtn = document.getElementById("noBtn");
      const x = Math.random() * 300 - 150;
      const y = Math.random() * 300 - 150;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    function confetti() {
      for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.innerHTML = "❤️";
        confetti.style.position = "fixed";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-20px";
        confetti.style.fontSize = "25px";
        confetti.style.animation = "fall 3s linear";
        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 3000);
      }
    }

    const style = document.createElement("style");
    style.innerHTML = `
      @keyframes fall {
        to {
          transform: translateY(100vh);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>

</body>
</html>
